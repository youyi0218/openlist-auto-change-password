<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{TITLE}}</title>
    <meta name="theme-color" content="#ecf2ff">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="preload" as="image" href="{{BACKGROUND_LANDSCAPE}}">
    <style>
      @font-face {
        font-family: "JingNanRound";
        src: url("./jingnan-round.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --bg-base: #f4f7ff;
        --text: #10203f;
        --muted: #5b6a85;
        --page-overlay:
          linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.05) 100%),
          radial-gradient(circle at 16% 20%, rgba(128, 196, 255, 0.18), transparent 30%),
          radial-gradient(circle at 84% 20%, rgba(255,255,255,0.14), transparent 24%),
          radial-gradient(circle at 80% 84%, rgba(186, 167, 255, 0.16), transparent 30%);
        --title-shadow: 0 12px 30px rgba(255, 255, 255, 0.28);
        --glass-blur: 6px;
        --glass-saturate: 150%;
        --glass-contrast: 1.02;
        --glass-fill: linear-gradient(145deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
        --glass-fill-strong: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
        --glass-stroke: rgba(255,255,255,0.34);
        --glass-stroke-strong: rgba(255,255,255,0.46);
        --glass-shadow: 0 18px 44px rgba(20, 32, 63, 0.14), inset 0 1px 0 rgba(255,255,255,0.22);
        --glass-highlight:
          linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 48%),
          radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 32%);
        --accent: #2563eb;
        --accent-soft: rgba(37,99,235,0.14);
        --success: #16a34a;
        --divider: rgba(255,255,255,0.18);
        --button-size: clamp(48px, 5vw, 60px);
        --theme-color: #ecf2ff;
        --bg-landscape: url("{{BACKGROUND_LANDSCAPE}}");
        --bg-portrait: url("{{BACKGROUND_PORTRAIT}}");
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg-base: #09111f;
        --text: #f4f7ff;
        --muted: #ced7eb;
        --page-overlay:
          linear-gradient(180deg, rgba(4,10,22,0.20) 0%, rgba(4,10,22,0.06) 100%),
          radial-gradient(circle at 16% 20%, rgba(94, 180, 255, 0.12), transparent 30%),
          radial-gradient(circle at 84% 20%, rgba(255,255,255,0.06), transparent 24%),
          radial-gradient(circle at 80% 84%, rgba(186, 167, 255, 0.10), transparent 30%);
        --title-shadow: 0 12px 28px rgba(1, 4, 10, 0.34);
        --glass-fill: linear-gradient(145deg, rgba(8,15,30,0.12), rgba(8,15,30,0.04));
        --glass-fill-strong: linear-gradient(145deg, rgba(8,15,30,0.14), rgba(8,15,30,0.05));
        --glass-stroke: rgba(255,255,255,0.16);
        --glass-stroke-strong: rgba(255,255,255,0.24);
        --glass-shadow: 0 18px 50px rgba(2,6,23,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
        --glass-highlight:
          linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.01) 48%),
          radial-gradient(circle at top left, rgba(255,255,255,0.10), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 32%);
        --accent: #8ab9ff;
        --accent-soft: rgba(138,185,255,0.16);
        --success: #86efac;
        --divider: rgba(255,255,255,0.12);
        --theme-color: #09111f;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: "JingNanRound", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg-base);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image: var(--bg-landscape);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        transform: scale(1.01);
      }

      body::after {
        background: var(--page-overlay);
      }

      @media (orientation: portrait) {
        body::before { background-image: var(--bg-portrait); }
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        padding:
          max(14px, env(safe-area-inset-top) + 14px)
          max(14px, env(safe-area-inset-right) + 14px)
          max(14px, env(safe-area-inset-bottom) + 14px)
          max(14px, env(safe-area-inset-left) + 14px);
      }

      .floating-tools {
        position: fixed;
        top: max(14px, env(safe-area-inset-top) + 14px);
        right: max(14px, env(safe-area-inset-right) + 14px);
        z-index: 20;
      }

      .glass,
      .theme-toggle,
      .liquid-button {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid var(--glass-stroke);
        background: var(--glass-fill);
        box-shadow: var(--glass-shadow);
        backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        isolation: isolate;
      }

      .glass::before,
      .theme-toggle::before,
      .liquid-button::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: inherit;
        background: var(--glass-highlight);
        pointer-events: none;
        z-index: 0;
      }

      .glass > *,
      .theme-toggle > *,
      .liquid-button > * {
        position: relative;
        z-index: 1;
      }

      .theme-toggle {
        width: var(--button-size);
        height: var(--button-size);
        padding: 0;
        display: grid;
        place-items: center;
        border-radius: 999px;
        cursor: pointer;
        background: var(--glass-fill-strong);
        border-color: var(--glass-stroke-strong);
        color: var(--text);
        transition: transform .18s ease, box-shadow .18s ease;
      }

      .theme-toggle:hover {
        transform: translateY(-2px);
      }

      .theme-toggle svg {
        width: clamp(22px, 2.4vw, 26px);
        height: clamp(22px, 2.4vw, 26px);
        fill: currentColor;
      }

      .icon-moon { display: none; }
      :root[data-theme="dark"] .icon-sun { display: none; }
      :root[data-theme="dark"] .icon-moon { display: block; }

      .hero {
        width: min(1120px, 100%);
        min-height: calc(100dvh - max(28px, env(safe-area-inset-top) + 28px) - max(28px, env(safe-area-inset-bottom) + 28px));
        margin: 0 auto;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: clamp(14px, 2.2vw, 22px);
        padding-top: clamp(14px, 2.4vw, 24px);
        padding-bottom: clamp(12px, 2vw, 20px);
      }

      .title {
        margin: 0;
        text-align: center;
        font-size: clamp(38px, 7vw, 92px);
        line-height: 1;
        letter-spacing: .08em;
        font-weight: 900;
        text-shadow: var(--title-shadow);
      }

      .dates {
        width: min(860px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0;
        padding: 10px;
      }

      .date-item {
        padding: 12px 16px;
        text-align: center;
      }

      .date-item + .date-item { border-left: 1px solid var(--divider); }
      .date-item__label { display:block; font-size:13px; color:var(--muted); margin-bottom:8px; }
      .date-item__value { display:block; font-size:clamp(15px,1.9vw,21px); font-weight:800; }

      .password-panel {
        width: min(920px, 100%);
        padding: clamp(20px, 4vw, 40px) clamp(16px, 4vw, 30px) 18px;
        text-align: center;
        background: var(--glass-fill-strong);
      }

      .password-value {
        margin: 0;
        font-size: clamp(36px, 8vw, 100px);
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: .05em;
        word-break: break-word;
        cursor: pointer;
      }

      .password-hint {
        margin-top: 12px;
        font-size: clamp(14px, 1.8vw, 15px);
        font-weight: 800;
        color: var(--accent);
      }

      .password-hint:empty { display:none; }
      .password-tip { min-height:20px; margin-top:10px; font-size:13px; color:var(--success); }

      .actions {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: clamp(14px, 2vw, 18px);
      }

      .actions:empty { display:none; }

      .liquid-button {
        display: grid;
        gap: 8px;
        min-height: clamp(118px, 18vh, 148px);
        padding: clamp(18px, 2.4vw, 24px);
        text-decoration: none;
        color: var(--text);
        background: var(--glass-fill-strong);
        border-color: var(--glass-stroke-strong);
        transition: transform .18s ease, box-shadow .18s ease;
      }

      .liquid-button:hover { transform: translateY(-3px); }

      .liquid-button::after {
        content: "?";
        position: absolute;
        right: 18px;
        bottom: 16px;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 18px;
        font-weight: 900;
        z-index: 1;
      }

      .liquid-button__title { font-size: clamp(26px, 4vw, 34px); font-weight:900; letter-spacing:.04em; }
      .liquid-button__hint { max-width:18em; font-size:clamp(13px,1.7vw,14px); line-height:1.5; color:var(--muted); }

      @media (max-width: 900px) {
        .actions { grid-template-columns: 1fr; }
        .liquid-button__hint { max-width: none; }
      }

      @media (max-width: 720px) {
        .hero { gap: 12px; padding-top: 16px; }
        .glass, .liquid-button { border-radius: 24px; }
        .dates { grid-template-columns: 1fr; padding: 8px; }
        .date-item { padding: 12px 10px; }
        .date-item + .date-item { border-left: 0; border-top: 1px solid var(--divider); }
        .password-panel { padding: 18px 12px 16px; }
        .liquid-button { min-height: 108px; }
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .glass, .theme-toggle, .liquid-button { background: rgba(255,255,255,0.84); }
        :root[data-theme="dark"] .glass,
        :root[data-theme="dark"] .theme-toggle,
        :root[data-theme="dark"] .liquid-button { background: rgba(8,15,30,0.84); }
      }
    </style>
  </head>
  <body>
    <div class="floating-tools">
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V4.25A.75.75 0 0 1 12 3.5Zm0 14.75a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V19a.75.75 0 0 1 .75-.75Zm8.5-6.25a.75.75 0 0 1 0 1.5H19a.75.75 0 0 1 0-1.5h1.5ZM5.75 12a.75.75 0 0 1-.75.75H3.5a.75.75 0 0 1 0-1.5H5a.75.75 0 0 1 .75.75Zm10.84-5.59a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 1 1-1.06 1.06L16.59 7.47a.75.75 0 0 1 0-1.06ZM6.35 16.65a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 1 1-1.06 1.06l-1.06-1.06a.75.75 0 0 1 0-1.06Zm12.36 0a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0ZM8.47 6.41a.75.75 0 0 1 0 1.06L7.41 8.53A.75.75 0 0 1 6.35 7.47l1.06-1.06a.75.75 0 0 1 1.06 0ZM12 7a5 5 0 1 1 0 10a5 5 0 0 1 0-10Zm0 1.5a3.5 3.5 0 1 0 0 7a3.5 3.5 0 0 0 0-7Z"></path></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.2 2.65a.75.75 0 0 1 .97.9a8.25 8.25 0 0 0 8.28 10.66a.75.75 0 0 1 .63 1.19A10.5 10.5 0 1 1 14.6 1.98a.75.75 0 0 1 .6.67Zm-1.08 1.86A9 9 0 1 0 21.7 13a9.76 9.76 0 0 1-7.58-8.5Z"></path></svg>
      </button>
    </div>

    <div class="page">
      <main class="hero">
        <h1 class="title">{{TITLE}}</h1>

        <div class="dates glass" aria-label="密码更新时间">
          <div class="date-item">
            <span class="date-item__label">当前密码更换日期</span>
            <span class="date-item__value">{{CURRENT_DATE}}</span>
          </div>
          <div class="date-item">
            <span class="date-item__label">下次密码更换日期</span>
            <span class="date-item__value">{{NEXT_DATE}}</span>
          </div>
        </div>

        <section class="password-panel glass" aria-label="当前密码">
          <p id="password-value" class="password-value" title="点击复制密码" tabindex="0">{{PASSWORD}}</p>
          <div class="password-hint">{{PASSWORD_HINT}}</div>
          <div id="copy-tip" class="password-tip" aria-live="polite"></div>
        </section>

        <nav class="actions" aria-label="快捷跳转">
          {{BUTTONS_HTML}}
        </nav>
      </main>
    </div>

    <script>
      window.__PASSWORD_PAGE_DATA__ = {{PAGE_DATA_JSON}};

      const root = document.documentElement;
      const themeToggle = document.getElementById('theme-toggle');
      const passwordValue = document.getElementById('password-value');
      const copyTip = document.getElementById('copy-tip');
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      const media = window.matchMedia('(prefers-color-scheme: dark)');
      const themeKey = 'password-page-theme';

      function getStoredTheme() {
        const stored = localStorage.getItem(themeKey);
        return stored === 'light' || stored === 'dark' ? stored : null;
      }

      function getSystemTheme() {
        return media.matches ? 'dark' : 'light';
      }

      function applyTheme(mode) {
        const resolved = mode || getSystemTheme();
        root.dataset.theme = resolved;
        root.style.colorScheme = resolved;
        themeToggle.setAttribute('aria-pressed', String(resolved === 'dark'));
        if (themeMeta) {
          themeMeta.setAttribute('content', getComputedStyle(root).getPropertyValue('--theme-color').trim() || (resolved === 'dark' ? '#09111f' : '#ecf2ff'));
        }
      }

      function toggleTheme() {
        const current = root.dataset.theme || getSystemTheme();
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem(themeKey, next);
        applyTheme(next);
      }

      async function copyPassword() {
        try {
          await navigator.clipboard.writeText(window.__PASSWORD_PAGE_DATA__.copyText || '');
          copyTip.textContent = '密码已复制到剪贴板';
        } catch (error) {
          copyTip.textContent = '复制失败，请手动复制';
        }
      }

      themeToggle.addEventListener('click', toggleTheme);
      passwordValue.addEventListener('click', copyPassword);
      passwordValue.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          copyPassword();
        }
      });

      media.addEventListener('change', () => {
        if (!getStoredTheme()) {
          applyTheme(null);
        }
      });

      applyTheme(getStoredTheme());
    </script>
  </body>
</html>
