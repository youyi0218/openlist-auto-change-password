<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{TITLE}}</title>
    <meta name="theme-color" content="#0c1222">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <style>
      @font-face {
        font-family: "JingNanRound";
        src: url("./jingnan-round.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        color-scheme: light dark;
        --bg-base: #0a1020;
        --text: #0f1e3b;
        --muted: #51617f;
        --page-overlay:
          linear-gradient(180deg, rgba(250, 252, 255, 0.08) 0%, rgba(250, 252, 255, 0.02) 100%),
          radial-gradient(circle at 14% 16%, rgba(125, 211, 252, 0.16), transparent 28%),
          radial-gradient(circle at 84% 18%, rgba(255, 255, 255, 0.12), transparent 22%),
          radial-gradient(circle at 82% 82%, rgba(196, 181, 253, 0.14), transparent 28%);
        --title-shadow: 0 12px 34px rgba(255, 255, 255, 0.22);
        --glass-blur: 7px;
        --glass-saturate: 165%;
        --glass-contrast: 1.03;
        --glass-fill: linear-gradient(140deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.015));
        --glass-fill-strong: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
        --glass-stroke: rgba(255, 255, 255, 0.34);
        --glass-stroke-strong: rgba(255, 255, 255, 0.46);
        --glass-shadow: 0 22px 54px rgba(15, 23, 42, 0.18), 0 4px 10px rgba(255, 255, 255, 0.05) inset;
        --glass-highlight:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.015) 44%),
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.22), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 30%);
        --accent: #2563eb;
        --accent-soft: rgba(37, 99, 235, 0.14);
        --success: #16a34a;
        --divider: rgba(255, 255, 255, 0.18);
        --floating-size: clamp(50px, 5.2vw, 64px);
        --bg-landscape: url("{{BACKGROUND_LANDSCAPE}}");
        --bg-portrait: url("{{BACKGROUND_PORTRAIT}}");
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --text: #f5f7ff;
        --muted: #d4dcf0;
        --page-overlay:
          linear-gradient(180deg, rgba(2, 6, 23, 0.16) 0%, rgba(2, 6, 23, 0.04) 100%),
          radial-gradient(circle at 14% 16%, rgba(125, 211, 252, 0.1), transparent 28%),
          radial-gradient(circle at 84% 18%, rgba(255, 255, 255, 0.06), transparent 22%),
          radial-gradient(circle at 82% 82%, rgba(196, 181, 253, 0.1), transparent 28%);
        --title-shadow: 0 12px 30px rgba(2, 6, 23, 0.32);
        --glass-fill: linear-gradient(140deg, rgba(8, 15, 30, 0.06), rgba(8, 15, 30, 0.015));
        --glass-fill-strong: linear-gradient(145deg, rgba(8, 15, 30, 0.08), rgba(8, 15, 30, 0.02));
        --glass-stroke: rgba(255, 255, 255, 0.16);
        --glass-stroke-strong: rgba(255, 255, 255, 0.22);
        --glass-shadow: 0 24px 60px rgba(2, 6, 23, 0.34), 0 4px 10px rgba(255, 255, 255, 0.03) inset;
        --glass-highlight:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01) 44%),
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.1), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.05), transparent 30%);
        --accent: #9ec8ff;
        --accent-soft: rgba(158, 200, 255, 0.16);
        --success: #7ee787;
        --divider: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "JingNanRound", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg-base);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image: var(--bg-landscape);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        transform: scale(1.012);
      }

      body::after {
        background: var(--page-overlay);
      }

      @media (orientation: portrait) {
        body::before {
          background-image: var(--bg-portrait);
        }
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        padding:
          max(14px, env(safe-area-inset-top) + 14px)
          max(14px, env(safe-area-inset-right) + 14px)
          max(14px, env(safe-area-inset-bottom) + 14px)
          max(14px, env(safe-area-inset-left) + 14px);
      }

      .floating-tools {
        position: fixed;
        top: max(14px, env(safe-area-inset-top) + 14px);
        right: max(14px, env(safe-area-inset-right) + 14px);
        z-index: 20;
        display: flex;
        gap: 10px;
      }

      .liquid-surface {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        border: 1px solid var(--glass-stroke);
        background: var(--glass-fill);
        box-shadow: var(--glass-shadow);
        backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        isolation: isolate;
      }

      .liquid-surface::before,
      .liquid-button::before,
      .theme-toggle::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: inherit;
        background: var(--glass-highlight);
        opacity: 0.96;
        pointer-events: none;
        z-index: 0;
      }

      .liquid-surface > *,
      .liquid-button > *,
      .theme-toggle > * {
        position: relative;
        z-index: 1;
      }

      .theme-toggle {
        appearance: none;
        width: var(--floating-size);
        height: var(--floating-size);
        display: grid;
        place-items: center;
        padding: 0;
        border-radius: 999px;
        border: 1px solid var(--glass-stroke-strong);
        background: var(--glass-fill-strong);
        color: var(--text);
        box-shadow: var(--glass-shadow);
        backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        cursor: pointer;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .theme-toggle:hover {
        transform: translateY(-2px) scale(1.02);
        border-color: var(--glass-stroke-strong);
        box-shadow: 0 26px 56px rgba(15, 23, 42, 0.22), 0 4px 10px rgba(255, 255, 255, 0.08) inset;
      }

      .theme-toggle svg {
        width: clamp(24px, 2.4vw, 28px);
        height: clamp(24px, 2.4vw, 28px);
        fill: currentColor;
      }

      .icon-moon {
        display: none;
      }

      :root[data-theme="dark"] .icon-sun {
        display: none;
      }

      :root[data-theme="dark"] .icon-moon {
        display: block;
      }

      .hero {
        width: min(1120px, 100%);
        min-height: calc(100dvh - max(28px, env(safe-area-inset-top) + 28px) - max(28px, env(safe-area-inset-bottom) + 28px));
        margin: 0 auto;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: clamp(14px, 2.6vw, 24px);
        padding-top: clamp(18px, 3vw, 34px);
        padding-bottom: clamp(12px, 2vw, 22px);
      }

      .title {
        margin: 0;
        text-align: center;
        font-size: clamp(40px, 7.2vw, 94px);
        line-height: 1;
        letter-spacing: 0.08em;
        font-weight: 900;
        text-shadow: var(--title-shadow);
      }

      .dates {
        width: min(860px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0;
        padding: 10px;
      }

      .date-item {
        padding: 12px 16px;
        text-align: center;
      }

      .date-item + .date-item {
        border-left: 1px solid var(--divider);
      }

      .date-item__label {
        display: block;
        font-size: clamp(12px, 1.3vw, 13px);
        color: var(--muted);
        margin-bottom: 8px;
      }

      .date-item__value {
        display: block;
        font-size: clamp(15px, 1.9vw, 21px);
        font-weight: 800;
        color: var(--text);
      }

      .password-panel {
        width: min(920px, 100%);
        padding: clamp(22px, 4.4vw, 42px) clamp(16px, 4vw, 34px) 18px;
        text-align: center;
        background: var(--glass-fill-strong);
      }

      .password-value {
        margin: 0;
        font-size: clamp(38px, 8vw, 104px);
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: 0.05em;
        word-break: break-word;
        cursor: pointer;
        text-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
      }

      .password-hint {
        margin-top: 12px;
        font-size: clamp(14px, 1.8vw, 15px);
        font-weight: 800;
        color: var(--accent);
      }

      .password-hint:empty {
        display: none;
      }

      .password-tip {
        min-height: 20px;
        margin-top: 10px;
        font-size: 13px;
        color: var(--success);
      }

      .actions {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: clamp(14px, 2vw, 18px);
      }

      .actions:empty {
        display: none;
      }

      .liquid-button {
        position: relative;
        overflow: hidden;
        display: grid;
        gap: 8px;
        min-height: clamp(126px, 19vh, 156px);
        text-decoration: none;
        color: var(--text);
        border-radius: 32px;
        border: 1px solid var(--glass-stroke-strong);
        background: var(--glass-fill-strong);
        padding: clamp(18px, 2.4vw, 24px) clamp(18px, 2.8vw, 26px);
        box-shadow: var(--glass-shadow);
        backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(var(--glass-contrast));
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        isolation: isolate;
      }

      .liquid-button:hover {
        transform: translateY(-3px) scale(1.008);
        box-shadow: 0 24px 54px rgba(15, 23, 42, 0.24), 0 4px 10px rgba(255, 255, 255, 0.08) inset;
      }

      .liquid-button::after {
        content: "↗";
        position: absolute;
        right: 18px;
        bottom: 16px;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 18px;
        font-weight: 900;
        z-index: 1;
      }

      .liquid-button__title {
        font-size: clamp(26px, 4vw, 34px);
        font-weight: 900;
        letter-spacing: 0.04em;
      }

      .liquid-button__hint {
        max-width: 18em;
        font-size: clamp(13px, 1.7vw, 14px);
        line-height: 1.5;
        color: var(--muted);
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .liquid-surface,
        .liquid-button,
        .theme-toggle {
          background: rgba(255, 255, 255, 0.82);
        }

        :root[data-theme="dark"] .liquid-surface,
        :root[data-theme="dark"] .liquid-button,
        :root[data-theme="dark"] .theme-toggle {
          background: rgba(8, 15, 30, 0.82);
        }
      }

      @media (max-width: 900px) {
        .actions {
          grid-template-columns: 1fr;
        }

        .liquid-button__hint {
          max-width: none;
        }
      }

      @media (max-width: 720px) {
        .hero {
          gap: 12px;
          padding-top: 18px;
          min-height: calc(100dvh - max(24px, env(safe-area-inset-top) + 24px) - max(24px, env(safe-area-inset-bottom) + 24px));
        }

        .liquid-surface,
        .liquid-button {
          border-radius: 24px;
        }

        .dates {
          grid-template-columns: 1fr;
          padding: 8px;
        }

        .date-item {
          padding: 12px 10px;
        }

        .date-item + .date-item {
          border-left: 0;
          border-top: 1px solid var(--divider);
        }

        .password-panel {
          padding: 20px 12px 16px;
        }

        .password-value {
          letter-spacing: 0.03em;
        }

        .liquid-button {
          min-height: 112px;
        }
      }

      @media (max-height: 860px) {
        .hero {
          gap: 12px;
          padding-top: 12px;
          padding-bottom: 10px;
        }

        .title {
          font-size: clamp(34px, 6vw, 72px);
        }

        .password-value {
          font-size: clamp(32px, 6.7vw, 82px);
        }

        .liquid-button {
          min-height: 108px;
          padding-top: 16px;
          padding-bottom: 16px;
        }
      }

      @media (max-height: 720px) {
        .page {
          padding-top: max(10px, env(safe-area-inset-top) + 10px);
          padding-bottom: max(10px, env(safe-area-inset-bottom) + 10px);
        }

        .hero {
          gap: 10px;
        }

        .title {
          font-size: clamp(28px, 5.2vw, 56px);
        }

        .date-item__label {
          margin-bottom: 4px;
        }

        .password-panel {
          padding-top: 16px;
          padding-bottom: 12px;
        }

        .password-hint,
        .password-tip {
          margin-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="floating-tools">
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换亮暗主题">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V4.25A.75.75 0 0 1 12 3.5Zm0 14.75a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V19a.75.75 0 0 1 .75-.75Zm8.5-6.25a.75.75 0 0 1 0 1.5H19a.75.75 0 0 1 0-1.5h1.5ZM5.75 12a.75.75 0 0 1-.75.75H3.5a.75.75 0 0 1 0-1.5H5a.75.75 0 0 1 .75.75Zm10.84-5.59a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 1 1-1.06 1.06L16.59 7.47a.75.75 0 0 1 0-1.06ZM6.35 16.65a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 1 1-1.06 1.06l-1.06-1.06a.75.75 0 0 1 0-1.06Zm12.36 0a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0ZM8.47 6.41a.75.75 0 0 1 0 1.06L7.41 8.53A.75.75 0 0 1 6.35 7.47l1.06-1.06a.75.75 0 0 1 1.06 0ZM12 7a5 5 0 1 1 0 10a5 5 0 0 1 0-10Zm0 1.5a3.5 3.5 0 1 0 0 7a3.5 3.5 0 0 0 0-7Z"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15.2 2.65a.75.75 0 0 1 .97.9a8.25 8.25 0 0 0 8.28 10.66a.75.75 0 0 1 .63 1.19A10.5 10.5 0 1 1 14.6 1.98a.75.75 0 0 1 .6.67Zm-1.08 1.86A9 9 0 1 0 21.7 13a9.76 9.76 0 0 1-7.58-8.5Z"/>
        </svg>
      </button>
    </div>

    <div class="page">
      <main class="hero">
        <h1 class="title">{{TITLE}}</h1>

        <div class="dates liquid-surface" aria-label="密码更新时间信息">
          <div class="date-item">
            <span class="date-item__label">当前密码更换日期</span>
            <span class="date-item__value">{{CURRENT_DATE}}</span>
          </div>
          <div class="date-item">
            <span class="date-item__label">下次密码更换日期</span>
            <span class="date-item__value">{{NEXT_DATE}}</span>
          </div>
        </div>

        <section class="password-panel liquid-surface" aria-label="当前密码">
          <p id="password-value" class="password-value" title="点击复制密码" tabindex="0">{{PASSWORD}}</p>
          <div class="password-hint">{{PASSWORD_HINT}}</div>
          <div id="copy-tip" class="password-tip" aria-live="polite"></div>
        </section>

        <nav class="actions" aria-label="快捷跳转">
          {{BUTTONS_HTML}}
        </nav>
      </main>
    </div>

    <script>
      window.__PASSWORD_PAGE_DATA__ = {{PAGE_DATA_JSON}};

      const storageKey = "password-page-theme";
      const root = document.documentElement;
      const themeToggle = document.getElementById("theme-toggle");
      const passwordValue = document.getElementById("password-value");
      const copyTip = document.getElementById("copy-tip");
      const media = window.matchMedia("(prefers-color-scheme: dark)");

      function getStoredTheme() {
        return localStorage.getItem(storageKey) || "system";
      }

      function getResolvedTheme(mode) {
        if (mode === "light") return "light";
        if (mode === "dark") return "dark";
        return media.matches ? "dark" : "light";
      }

      function applyTheme(mode) {
        root.dataset.theme = getResolvedTheme(mode);
      }

      function cycleTheme() {
        const order = ["system", "light", "dark"];
        const current = getStoredTheme();
        const next = order[(order.indexOf(current) + 1) % order.length];
        localStorage.setItem(storageKey, next);
        applyTheme(next);
      }

      async function copyPassword() {
        try {
          await navigator.clipboard.writeText(window.__PASSWORD_PAGE_DATA__.copyText || "");
          copyTip.textContent = "密码已复制到剪贴板";
        } catch (error) {
          copyTip.textContent = "复制失败，请手动复制";
        }
      }

      themeToggle.addEventListener("click", cycleTheme);
      passwordValue.addEventListener("click", copyPassword);
      passwordValue.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          copyPassword();
        }
      });
      media.addEventListener("change", () => {
        if (getStoredTheme() === "system") {
          applyTheme("system");
        }
      });

      applyTheme(getStoredTheme());
    </script>
  </body>
</html>
